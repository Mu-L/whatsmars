server:
  port: 8080

spring:
  application:
    name: whatsmars-arthas

# Actuator 端点暴露（可选，配合 /actuator/arthas 查看 Arthas 状态）
management:
  endpoints:
    web:
      exposure:
        include: arthas,health,info

# Arthas 配置
arthas:
  # Telnet 端口，用于 telnet 方式连接 Arthas 终端
  telnet-port: 3658
  # HTTP 端口，用于浏览器访问 Arthas Web Console
  http-port: 8563
  # 禁止 stop 命令，防止误操作关闭 Arthas
  disable-stop: true
