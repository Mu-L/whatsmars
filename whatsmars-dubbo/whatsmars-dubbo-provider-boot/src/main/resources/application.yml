spring:
  application:
    name: dubbo-spring-demo-provider

dubbo:
  application:
    name: ${spring.application.name}
    qos-port: 22222
  protocol:
    name: tri
    port: -1
  registry:
    id: zk-registry
    address: zookeeper://127.0.0.1:2181
  config-center:
    address: zookeeper://127.0.0.1:2181
  metadata-report:
    address: zookeeper://127.0.0.1:2181
  tracing:
    enabled: true

