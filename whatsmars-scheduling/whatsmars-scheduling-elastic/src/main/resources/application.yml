spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/elasticjob?useUnicode=true&characterEncoding=UTF-8&allowMultiQueries=true
    username: root
    password: root1234

elasticjob:
  tracing:
    type: RDB
  regCenter:
    serverLists: localhost:2181
    namespace: elasticjob-demo
  jobs:
    simpleJob:
      elasticJobClass: org.apache.shardingsphere.elasticjob.simple.job.SimpleJob
      cron: 0/5 * * * * ?
      shardingTotalCount: 3
      shardingItemParameters: 0=Beijing,1=Shanghai,2=Guangzhou
      jobErrorHandlerType: LOG
      overwrite: true # 是否开启本地配置覆盖ZK上的配置
    dataflowJob:
      elasticJobClass: org.apache.shardingsphere.elasticjob.dataflow.job.DataflowJob
      cron: 0/5 * * * * ?
      shardingTotalCount: 3
      shardingItemParameters: 0=Beijing,1=Shanghai,2=Guangzhou
      jobErrorHandlerType: LOG
      overwrite: true
    scriptJob:
      elasticJobType: SCRIPT
      cron: 0/10 * * * * ?
      shardingTotalCount: 3
      jobErrorHandlerType: LOG
      overwrite: true
      props:
        script.command.line: "echo SCRIPT Job: "
    myOneOffJob:
      elasticJobType: SCRIPT
      jobBootstrapBeanName: myOneOffJobBean
      shardingTotalCount: 9
      jobErrorHandlerType: LOG
      overwrite: true
      props:
        script.command.line: "echo Manual SCRIPT Job: "