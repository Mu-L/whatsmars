server:
  port: 8082
spring:
  application:
    name: whatsmars-ai-langchain4j

langchain4j:
  open-ai:
    # 同步聊天模型配置（用于非流式接口）
    chat-model:
      # Qwen 的 OpenAI 兼容接口地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      # 指定模型，如 qwen-plus, qwen-max 等
      model-name: qwen-plus
      # 开启请求响应日志，方便调试
      log-requests: true
      log-responses: true
      temperature: 0.7
      top-p: 0.9
    
    # 流式聊天模型配置（用于 TokenStream 流式接口）
    streaming-chat-model:
      # Qwen 的 OpenAI 兼容接口地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      # 指定模型，如 qwen-plus, qwen-max 等
      model-name: qwen-plus
      # 开启请求响应日志，方便调试
      log-requests: true
      log-responses: true
      temperature: 0.7
      top-p: 0.9
