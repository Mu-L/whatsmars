server:
  port: 8082
spring:
  application:
    name: whatsmars-ai-langchain4j

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      model-name: qwen-plus
      log-requests: false
      log-responses: false
      temperature: 0.7
      top-p: 0.9
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      model-name: qwen-plus
      log-requests: false
      log-responses: false
      temperature: 0.7
      top-p: 0.9
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-v3
      log-requests: false
      log-responses: false
