spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          # 通义千问的嵌入模型
          model: text-embedding-v3
          # 或者使用 text-embedding-v2