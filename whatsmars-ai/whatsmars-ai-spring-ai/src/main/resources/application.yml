spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-plus # 纯文本模型
          temperature: 0.7
      embedding:
        options:
          # Qwen 的嵌入模型
          model: text-embedding-v3
          # 或者使用 text-embedding-v2
      vision:
        model: qwen3.7-plus # 多模态视觉模型（需支持图像输入）
    vectorstore:
      redis:
        # Redis 向量索引名称
        index-name: spring-ai-vector-index
        # 向量维度（text-embedding-v3 默认 1024 维）
        dimensions: 1024
        # 初始化 schema（首次启动时设为 true）
        initialize-schema: true
        # 相似度算法：COSINE, L2, IP
        distance-type: COSINE
    mcp:
      server:
        name: whatsmars-mcp-server    # MCP 服务名称，Client 连接时使用
        version: 1.0.0                # 服务版本
        type: SYNC                    # 运行模式：SYNC（同步）或 ASYNC（异步）

  redis:
    host: localhost
    port: 6379
