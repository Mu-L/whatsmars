# 数据源配置
dataSources:
  ds0:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/order_db_0?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root1234
  
  ds1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/order_db_1?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root1234

# 分片规则配置
rules:
  - !SHARDING
    tables:
      t_order:  # 逻辑表名
        actualDataNodes: ds${0..1}.t_order_${0..1}  # 物理节点映射
        databaseStrategy:  # 分库策略
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: db_inline
        tableStrategy:  # 分表策略
          standard:
            shardingColumn: user_id
            shardingAlgorithmName: table_inline
        keyGenerateStrategy:  # 分布式ID生成
          column: id
          keyGeneratorName: snowflake
    
    # 分片算法
    shardingAlgorithms:
      db_inline:
        type: INLINE
        props:
          algorithm-expression: ds${user_id % 2}
      table_inline:
        type: INLINE
        props:
          algorithm-expression: t_order_${user_id % 2}
    
    # 分布式ID生成器（雪花算法）
    keyGenerators:
      snowflake:
        type: SNOWFLAKE
        props:
          worker-id: 1  # 工作机器ID（0-1023）

props:
  sql-show: true  # 打印SQL日志，便于调试